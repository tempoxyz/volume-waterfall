<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipeline Waterfall</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:32px 16px}
.wrap{max-width:1200px;width:100%}
h1{font-size:22px;font-weight:700;margin-bottom:4px;opacity:.9}
.sub{font-size:13px;opacity:.35;margin-bottom:24px}
.controls{display:flex;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.toggle{display:flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.toggle button{padding:7px 18px;font-size:13px;font-weight:500;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;transition:all .15s}
.toggle button.active{background:rgba(255,255,255,.12);color:#fff}
.toggle button:hover:not(.active){background:rgba(255,255,255,.06)}
.chart-wrap{background:#12121a;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow-x:auto;position:relative;padding:16px}
.tip{position:absolute;pointer-events:none;background:#1e1e2e;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px 14px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:opacity .15s;z-index:10;max-width:280px}
.tip.show{opacity:1}
.tip b{display:block;color:#fff;margin-bottom:3px;font-size:13px}
.tip span{color:#34d399}
.tip .breakdown{margin-top:6px;border-top:1px solid rgba(255,255,255,.1);padding-top:6px;font-size:11px;line-height:1.6}
.tip .breakdown div{display:flex;justify-content:space-between;gap:12px}
.tip .breakdown .bname{color:rgba(255,255,255,.6)}
.tip .breakdown .bval{color:rgba(255,255,255,.9);font-variant-numeric:tabular-nums}
.foot{margin-top:20px;font-size:11px;opacity:.2}
.loading{text-align:center;padding:80px 0;opacity:.5;font-size:14px}
.refresh{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;transition:background .15s}
.refresh:hover{background:rgba(255,255,255,.14)}
.midmarket-sum{font-size:13px;color:#34d399;font-weight:600;margin-left:4px}
.extra-inputs{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.input-group{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.6)}
.input-group input{width:56px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-size:13px;padding:5px 8px;text-align:right;font-variant-numeric:tabular-nums}
.input-group input:focus{outline:none;border-color:rgba(255,255,255,.35)}
.input-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.ts{font-size:11px;opacity:.25;margin-top:8px}
canvas{width:100%;height:auto}
.legend{display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;padding:0 4px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;opacity:.6}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-line{width:16px;height:0;border-top:2px dashed}
</style>
</head>
<body>
<div class="wrap">
<h1>Pipeline Volume (1mo) — Waterfall</h1>
<p class="sub">Live from spreadsheet · Column B (Customer) × Column F (Volume)</p>
<div class="controls">
<div class="toggle" id="toggle">
<button class="active" data-filter="all">All</button>
<button data-filter="committed">Committed</button>
</div>
<button class="refresh" onclick="load()">↻ Refresh</button>
<span class="midmarket-sum" id="midmarket-sum"></span>
</div>
<div class="extra-inputs">
<label class="input-group"><span class="input-dot" style="background:#f472b6"></span>Bridge Pre-Load Wallets<input type="text" id="input-bridge" value="100" data-key="bridge">M</label>
<label class="input-group"><span class="input-dot" style="background:#c084fc"></span>Axiym<input type="text" id="input-axiym" value="200" data-key="axiym">M</label>
</div>
<div class="chart-wrap" id="cw">
<div class="tip" id="tip"><b id="tn"></b><span id="tv"></span><div class="breakdown" id="tbd" style="display:none"></div></div>
<div class="loading" id="loader">Loading spreadsheet data…</div>
<canvas id="canvas" style="display:none"></canvas>
</div>
<div class="legend" id="legend"></div>
<p class="ts" id="ts"></p>
<p class="foot">Source: <a href="https://docs.google.com/spreadsheets/d/1lgKZ_cdguX1fmtjYc2IOopPHubRbBIivocgpXViT2P8/edit?gid=1634419146#gid=1634419146" style="color:inherit;text-decoration:underline" target="_blank">Pipeline spreadsheet</a></p>
</div>
<script>
const SHEET_ID='1lgKZ_cdguX1fmtjYc2IOopPHubRbBIivocgpXViT2P8';
const GID='1634419146';
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const cw=document.getElementById('cw');
const tip=document.getElementById('tip');
const tn=document.getElementById('tn');
const tv=document.getElementById('tv');
const tbd=document.getElementById('tbd');
const loader=document.getElementById('loader');

const OBJECTIVE=500_000_000;

function getExtraItems(){
  const bridgeVal=parseFloat(document.getElementById('input-bridge').value)||0;
  const axiymVal=parseFloat(document.getElementById('input-axiym').value)||0;
  const items=[];
  if(bridgeVal>0) items.push({name:'Bridge Pre-Load Wallets',value:bridgeVal*1_000_000,color:['#f472b6','#db2777']});
  if(axiymVal>0) items.push({name:'Axiym',value:axiymVal*1_000_000,color:['#c084fc','#9333ea']});
  return items;
}

const COLLAPSE_THRESHOLD=1_000_000;

let rawData=null;
let chartData=null;
let chartBars=[];
let activeFilter='all';

// Toggle buttons
document.getElementById('toggle').addEventListener('click',e=>{
  const btn=e.target.closest('button[data-filter]');
  if(!btn) return;
  activeFilter=btn.dataset.filter;
  document.querySelectorAll('#toggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(rawData) redraw();
});

function parseCSV(text){
  const rows=[];let row=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){if(c==='"'&&n==='"'){field+='"';i++}else if(c==='"'){inQ=false}else{field+=c}}
    else{if(c==='"'){inQ=true}else if(c===','){row.push(field);field=''}else if(c==='\n'||(c==='\r'&&n==='\n')){if(c==='\r')i++;row.push(field);rows.push(row);row=[];field=''}else if(c==='\r'){row.push(field);rows.push(row);row=[];field=''}else{field+=c}}
  }
  if(field||row.length)row.push(field),rows.push(row);
  return rows;
}

async function fetchData(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}&_=${Date.now()}`;
  const resp=await fetch(url);
  if(!resp.ok) throw new Error('Failed to fetch spreadsheet');
  const text=await resp.text();
  const rows=parseCSV(text);
  const data=[];
  for(let i=3;i<rows.length;i++){
    const row=rows[i];
    if(!row||row.length<6) continue;
    const name=row[1]?.trim();
    let valStr=row[5]?.trim();
    if(!name||!valStr||valStr==='$0'||valStr==='N/A'||valStr==='') continue;
    const val=parseFloat(valStr.replace(/[$,]/g,''));
    const status=(row[11]||'').trim().toLowerCase();
    if(!isNaN(val)&&val>0) data.push({name,value:val,status});
  }
  data.sort((a,b)=>b.value-a.value);
  return data;
}

function filterData(raw){
  if(activeFilter==='committed') return raw.filter(d=>d.status==='committed');
  return raw;
}

function buildChartItems(filtered){
  const big=filtered.filter(d=>d.value>=COLLAPSE_THRESHOLD);
  const small=filtered.filter(d=>d.value<COLLAPSE_THRESHOLD);
  const items=[];

  for(const d of big){
    items.push({name:d.name,value:d.value,type:'pipeline',color:['#34d399','#059669']});
  }

  if(small.length>0){
    const otherVal=small.reduce((s,d)=>s+d.value,0);
    items.push({name:`Other (${small.length})`,value:otherVal,type:'pipeline',color:['#34d399','#059669'],breakdown:small});
  }

  for(const e of getExtraItems()){
    items.push({name:e.name,value:e.value,type:'extra',color:e.color});
  }

  return items;
}

const fmt=v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:v>=1e3?`$${(v/1e3).toFixed(0)}K`:`$${v}`;
const fmtF=v=>'$'+v.toLocaleString('en-US');

function draw(items){
  const dpr=window.devicePixelRatio||1;
  const TOTAL=items.reduce((s,d)=>s+d.value,0);
  const M={t:60,r:40,b:130,l:90};
  const W=Math.max(cw.clientWidth-32,600);
  const H=Math.max(500,Math.min(650,W*.45));

  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const cW=W-M.l-M.r,cH=H-M.t-M.b;
  const maxY=Math.max(OBJECTIVE,TOTAL)*1.1;
  const n=items.length+1,gap=cW/n,bw=Math.min(gap*.65,48);
  const sc=v=>(v/maxY)*cH;

  chartBars=[];

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px -apple-system,system-ui,sans-serif';
  ctx.textAlign='right';
  for(let i=0;i<=5;i++){
    const v=maxY/5*i,y=M.t+cH-sc(v);
    ctx.beginPath();ctx.moveTo(M.l,y);ctx.lineTo(W-M.r,y);ctx.stroke();
    ctx.fillText(fmt(v),M.l-10,y+4);
  }

  // Objective line
  const objY=M.t+cH-sc(OBJECTIVE);
  ctx.strokeStyle='#fbbf24';ctx.lineWidth=2;ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(M.l,objY);ctx.lineTo(W-M.r,objY);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#fbbf24';ctx.font='bold 12px -apple-system,system-ui,sans-serif';
  ctx.textAlign='left';
  ctx.fillText('Objective: $500M',W-M.r-140,objY-8);

  // Bars
  let cum=0;

  items.forEach((item,i)=>{
    const x=M.l+i*gap+(gap-bw)/2;
    const bH=Math.max(sc(item.value),2);
    const y=M.t+cH-sc(cum+item.value);
    cum+=item.value;
    const connY=M.t+cH-sc(cum);

    const grad=ctx.createLinearGradient(0,y,0,y+bH);
    grad.addColorStop(0,item.color[0]);grad.addColorStop(1,item.color[1]);
    ctx.fillStyle=grad;
    roundRect(ctx,x,y,bw,bH,3);ctx.fill();

    ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.font='bold 10px -apple-system,system-ui,sans-serif';ctx.textAlign='center';
    ctx.fillText(fmt(item.value),x+bw/2,y-6);

    if(i<items.length-1){
      const nx=M.l+(i+1)*gap+(gap-bw)/2;
      ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.setLineDash([3,3]);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+bw,connY);ctx.lineTo(nx,connY);ctx.stroke();
      ctx.setLineDash([]);
    }

    ctx.save();
    ctx.translate(x+bw/2,M.t+cH+14);ctx.rotate(-Math.PI/4);
    ctx.fillStyle=item.type==='extra'?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.6)';
    ctx.font=(item.type==='extra'?'bold ':'')+('11px -apple-system,system-ui,sans-serif');
    ctx.textAlign='right';ctx.fillText(item.name,0,0);
    ctx.restore();

    chartBars.push({x,y,w:bw,h:bH,name:item.name,value:item.value,breakdown:item.breakdown||null,color:item.color[0]});
  });

  // Connector last -> total
  const lastX=M.l+(items.length-1)*gap+(gap-bw)/2;
  const lastConnY=M.t+cH-sc(cum);
  const tX=M.l+items.length*gap+(gap-bw)/2;
  ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.setLineDash([3,3]);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(lastX+bw,lastConnY);ctx.lineTo(tX,lastConnY);ctx.stroke();
  ctx.setLineDash([]);

  // Total bar
  const tH=sc(TOTAL),tY=M.t+cH-tH;
  const totalGrad=ctx.createLinearGradient(0,tY,0,tY+tH);
  totalGrad.addColorStop(0,'#60a5fa');totalGrad.addColorStop(1,'#2563eb');
  ctx.fillStyle=totalGrad;
  roundRect(ctx,tX,tY,bw,tH,3);ctx.fill();

  const pct=Math.round(TOTAL/OBJECTIVE*100);
  ctx.fillStyle='rgba(255,255,255,0.95)';ctx.font='bold 12px -apple-system,system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText(fmt(TOTAL),tX+bw/2,tY-18);
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px -apple-system,system-ui,sans-serif';
  ctx.fillText(`${pct}% of target`,tX+bw/2,tY-6);

  ctx.save();
  ctx.translate(tX+bw/2,M.t+cH+14);ctx.rotate(-Math.PI/4);
  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 12px -apple-system,system-ui,sans-serif';
  ctx.textAlign='right';ctx.fillText('Total',0,0);
  ctx.restore();

  chartBars.push({x:tX,y:tY,w:bw,h:tH,name:'Total',value:TOTAL,breakdown:null,color:'#60a5fa'});

  // Mid-market subtotal
  const midmarketSum=items.filter(d=>d.type==='pipeline').reduce((s,d)=>s+d.value,0);
  document.getElementById('midmarket-sum').textContent='Mid-market: '+fmt(midmarketSum);

  // Legend
  const legend=document.getElementById('legend');
  legend.innerHTML='';
  const legendItems=[
    {label:'Mid-market',color:'#34d399',type:'dot'},
    {label:'Bridge Pre-Load Wallets',color:'#f472b6',type:'dot'},
    {label:'Axiym',color:'#c084fc',type:'dot'},
    {label:'Total',color:'#60a5fa',type:'dot'},
    {label:'Objective ($500M)',color:'#fbbf24',type:'line'},
  ];
  for(const l of legendItems){
    const d=document.createElement('div');d.className='legend-item';
    if(l.type==='line'){
      d.innerHTML=`<div class="legend-line" style="border-color:${l.color}"></div>${l.label}`;
    }else{
      d.innerHTML=`<div class="legend-dot" style="background:${l.color}"></div>${l.label}`;
    }
    legend.appendChild(d);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/(window.devicePixelRatio||1)/rect.width;
  const scaleY=canvas.height/(window.devicePixelRatio||1)/rect.height;
  const mx=(e.clientX-rect.left)*scaleX;
  const my=(e.clientY-rect.top)*scaleY;
  let found=false;
  for(const b of chartBars){
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      tn.textContent=b.name;
      tv.textContent=fmtF(b.value);
      if(b.breakdown){
        tbd.style.display='block';
        tbd.innerHTML=b.breakdown.map(d=>`<div><span class="bname">${d.name}</span><span class="bval">${fmtF(d.value)}</span></div>`).join('');
      }else{
        tbd.style.display='none';
      }
      tip.style.left=(e.clientX-cw.getBoundingClientRect().left+12)+'px';
      tip.style.top=(e.clientY-cw.getBoundingClientRect().top-40)+'px';
      tip.classList.add('show');found=true;break;
    }
  }
  if(!found) tip.classList.remove('show');
});
canvas.addEventListener('mouseleave',()=>tip.classList.remove('show'));

function redraw(){
  const filtered=filterData(rawData);
  const items=buildChartItems(filtered);
  chartData=items;
  draw(items);
}

async function load(){
  loader.style.display='block';canvas.style.display='none';
  try{
    rawData=await fetchData();
    loader.style.display='none';canvas.style.display='block';
    redraw();
    document.getElementById('ts').textContent='Last updated: '+new Date().toLocaleTimeString();
  }catch(e){
    loader.innerHTML='<div style="color:#f87171;padding:40px">⚠ '+e.message+'<br><br><button class="refresh" onclick="load()">Retry</button></div>';
  }
}

// Redraw on input change
document.querySelectorAll('.extra-inputs input').forEach(inp=>{
  inp.addEventListener('input',()=>{if(rawData)redraw()});
});

load();
window.addEventListener('resize',()=>{if(chartData)redraw()});
</script>
</body>
</html>
