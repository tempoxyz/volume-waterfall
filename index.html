<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pipeline Waterfall</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:-apple-system,system-ui,sans-serif;min-height:100vh;display:flex;justify-content:center;padding:32px 16px}
.wrap{max-width:1200px;width:100%}
h1{font-size:22px;font-weight:700;margin-bottom:4px;opacity:.9}
.sub{font-size:13px;opacity:.35;margin-bottom:24px}
.chart-wrap{background:#12121a;border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow-x:auto;position:relative;padding:16px}
.tip{position:absolute;pointer-events:none;background:#1e1e2e;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:8px 12px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:opacity .15s;z-index:10}
.tip.show{opacity:1}
.tip b{display:block;color:#fff;margin-bottom:2px}
.tip span{color:#34d399}
.foot{margin-top:20px;font-size:11px;opacity:.2}
.loading{text-align:center;padding:80px 0;opacity:.5;font-size:14px}
.refresh{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;transition:background .15s;margin-left:16px}
.refresh:hover{background:rgba(255,255,255,.14)}
.ts{font-size:11px;opacity:.25;margin-top:8px}
canvas{width:100%;height:auto}
</style>
</head>
<body>
<div class="wrap">
<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
<h1>Pipeline Volume (3mo) — Waterfall</h1>
<button class="refresh" onclick="load()">↻ Refresh</button>
</div>
<p class="sub">Live from spreadsheet · Column B (Customer) × Column F (Volume 3mo)</p>
<div class="chart-wrap" id="cw">
<div class="tip" id="tip"><b id="tn"></b><span id="tv"></span></div>
<div class="loading" id="loader">Loading spreadsheet data…</div>
<canvas id="canvas" style="display:none"></canvas>
</div>
<p class="ts" id="ts"></p>
<p class="foot">Source: <a href="https://docs.google.com/spreadsheets/d/1lgKZ_cdguX1fmtjYc2IOopPHubRbBIivocgpXViT2P8/edit?gid=1634419146#gid=1634419146" style="color:inherit;text-decoration:underline" target="_blank">Pipeline spreadsheet</a></p>
</div>
<script>
const SHEET_ID='1lgKZ_cdguX1fmtjYc2IOopPHubRbBIivocgpXViT2P8';
const GID='1634419146';
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const cw=document.getElementById('cw');
const tip=document.getElementById('tip');
const tn=document.getElementById('tn');
const tv=document.getElementById('tv');
const loader=document.getElementById('loader');

let chartData=null;
let chartBars=[];

function parseCSV(text){
  const rows=[];let row=[],field='',inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(inQ){if(c==='"'&&n==='"'){field+='"';i++}else if(c==='"'){inQ=false}else{field+=c}}
    else{if(c==='"'){inQ=true}else if(c===','){row.push(field);field=''}else if(c==='\n'||(c==='\r'&&n==='\n')){if(c==='\r')i++;row.push(field);rows.push(row);row=[];field=''}else if(c==='\r'){row.push(field);rows.push(row);row=[];field=''}else{field+=c}}
  }
  if(field||row.length)row.push(field),rows.push(row);
  return rows;
}

async function fetchData(){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}&_=${Date.now()}`;
  const resp=await fetch(url);
  if(!resp.ok) throw new Error('Failed to fetch spreadsheet');
  const text=await resp.text();
  const rows=parseCSV(text);
  const data=[];
  for(let i=3;i<rows.length;i++){
    const row=rows[i];
    if(!row||row.length<6) continue;
    const name=row[1]?.trim();
    let valStr=row[5]?.trim();
    if(!name||!valStr||valStr==='$0'||valStr==='N/A'||valStr==='') continue;
    const val=parseFloat(valStr.replace(/[$,]/g,''));
    if(!isNaN(val)&&val>0) data.push({name,value:val});
  }
  data.sort((a,b)=>b.value-a.value);
  return data;
}

const fmt=v=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:v>=1e3?`$${(v/1e3).toFixed(0)}K`:`$${v}`;
const fmtF=v=>'$'+v.toLocaleString('en-US');

function draw(D){
  const dpr=window.devicePixelRatio||1;
  const TOTAL=D.reduce((s,d)=>s+d.value,0);
  const M={t:60,r:40,b:130,l:90};
  const W=Math.max(cw.clientWidth-32,600);
  const H=Math.max(480,Math.min(620,W*.45));

  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const cW=W-M.l-M.r,cH=H-M.t-M.b;
  const n=D.length+1,gap=cW/n,bw=Math.min(gap*.65,44);
  const sc=v=>(v/TOTAL)*cH;

  chartBars=[];

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='11px -apple-system,system-ui,sans-serif';
  ctx.textAlign='right';
  for(let i=0;i<=5;i++){
    const v=TOTAL/5*i,y=M.t+cH-sc(v);
    ctx.beginPath();ctx.moveTo(M.l,y);ctx.lineTo(W-M.r,y);ctx.stroke();
    ctx.fillText(fmt(v),M.l-10,y+4);
  }

  // Bars
  let cum=0;
  const grad1=ctx.createLinearGradient(0,M.t,0,M.t+cH);
  grad1.addColorStop(0,'#34d399');grad1.addColorStop(1,'#059669');
  const grad2=ctx.createLinearGradient(0,M.t,0,M.t+cH);
  grad2.addColorStop(0,'#60a5fa');grad2.addColorStop(1,'#2563eb');

  D.forEach(({name,value},i)=>{
    const x=M.l+i*gap+(gap-bw)/2;
    const bH=Math.max(sc(value),2);
    const y=M.t+sc(TOTAL-cum-value);
    cum+=value;
    const connY=M.t+sc(TOTAL-cum);

    // Bar
    ctx.fillStyle=grad1;
    roundRect(ctx,x,y,bw,bH,3);ctx.fill();

    // Value label
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='10px -apple-system,system-ui,sans-serif';ctx.textAlign='center';
    ctx.fillText(fmt(value),x+bw/2,y-6);

    // Connector
    if(i<D.length-1){
      const nx=M.l+(i+1)*gap+(gap-bw)/2;
      ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.setLineDash([3,3]);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x+bw,connY);ctx.lineTo(nx,connY);ctx.stroke();
      ctx.setLineDash([]);
    }

    // X label (rotated)
    ctx.save();
    ctx.translate(x+bw/2,M.t+cH+14);ctx.rotate(-Math.PI/4);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px -apple-system,system-ui,sans-serif';
    ctx.textAlign='right';ctx.fillText(name,0,0);
    ctx.restore();

    chartBars.push({x,y,w:bw,h:bH,name,value});
  });

  // Connector last -> total
  const lastX=M.l+(D.length-1)*gap+(gap-bw)/2;
  const lastConnY=M.t+sc(TOTAL-cum);
  const tX=M.l+D.length*gap+(gap-bw)/2;
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.setLineDash([3,3]);ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(lastX+bw,lastConnY);ctx.lineTo(tX,lastConnY);ctx.stroke();
  ctx.setLineDash([]);

  // Total bar
  const tH=sc(TOTAL),tY=M.t+cH-tH;
  ctx.fillStyle=grad2;
  roundRect(ctx,tX,tY,bw,tH,3);ctx.fill();

  ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 12px -apple-system,system-ui,sans-serif';
  ctx.textAlign='center';ctx.fillText(fmt(TOTAL),tX+bw/2,tY-6);

  ctx.save();
  ctx.translate(tX+bw/2,M.t+cH+14);ctx.rotate(-Math.PI/4);
  ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='bold 12px -apple-system,system-ui,sans-serif';
  ctx.textAlign='right';ctx.fillText('Total',0,0);
  ctx.restore();

  chartBars.push({x:tX,y:tY,w:bw,h:tH,name:'Total',value:TOTAL});
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// Tooltip on hover
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/(window.devicePixelRatio||1)/rect.width;
  const scaleY=canvas.height/(window.devicePixelRatio||1)/rect.height;
  const mx=(e.clientX-rect.left)*scaleX;
  const my=(e.clientY-rect.top)*scaleY;
  let found=false;
  for(const b of chartBars){
    if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
      tn.textContent=b.name;tv.textContent=fmtF(b.value);
      tip.style.left=(e.clientX-cw.getBoundingClientRect().left+12)+'px';
      tip.style.top=(e.clientY-cw.getBoundingClientRect().top-40)+'px';
      tip.classList.add('show');found=true;break;
    }
  }
  if(!found) tip.classList.remove('show');
});
canvas.addEventListener('mouseleave',()=>tip.classList.remove('show'));

async function load(){
  loader.style.display='block';canvas.style.display='none';
  try{
    const data=await fetchData();
    chartData=data;
    loader.style.display='none';canvas.style.display='block';
    draw(data);
    document.getElementById('ts').textContent='Last updated: '+new Date().toLocaleTimeString();
  }catch(e){
    loader.innerHTML='<div style="color:#f87171;padding:40px">⚠ '+e.message+'<br><br><button class="refresh" onclick="load()">Retry</button></div>';
  }
}

load();
window.addEventListener('resize',()=>{if(chartData)draw(chartData)});
setInterval(load,30000);
</script>
</body>
</html>
